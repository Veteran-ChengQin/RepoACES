  pr_title_raw: "feat(openapi): refine API key auth proxy and app isolation"
  summary_source: pr_body_summary_section
  summary_raw_markdown: |
    - Add app-level APIKey isolation for publish channels and reject non-chat-completions usage for app-bound APIKeys.
    - Add global APIKey authProxy support for chat completions, limited to team owner enabled keys.
    - Allow APIKey plaintext to be copied again from account and publish-channel pages, with copy audit logging.
    - Align APIKey create/edit/copy modals to v2 modal styling and fix authProxy switch persistence.
    - Split APIKey docs between global APIKey and app APIKey concepts.

