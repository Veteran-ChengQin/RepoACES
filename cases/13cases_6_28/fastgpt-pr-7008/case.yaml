  pr_title_raw: "feat(code-sandbox): add queueId concurrency limit"
  summary_source: pr_body_summary_section
  summary_raw_markdown: |
    - Add optional `queueId` support to Code Sandbox `/sandbox/js` and `/sandbox/python` run APIs.
    - Add `SANDBOX_QUEUE_ID_CONCURRENCY` to limit how many requests with the same `queueId` may enter execution at once; empty/unset keeps the previous non-queued behavior.
    - Add a per-`queueId` FIFO limiter before worker-pool execution and release the limiter slot when `pool.execute(...)` completes.
    - Forward `queueId` from the service CodeSandbox client.
    - Update Code Sandbox README, 4.15.0-beta3 CN/EN upgrade docs, and internal design/issue notes.

